services:
  timescaledb:
    image: timescale/timescaledb:latest-pg16
    restart: unless-stopped
    environment:
      POSTGRES_USER: kama
      POSTGRES_PASSWORD: kama_dev
      POSTGRES_DB: kama_energy
    ports:
      - "5432:5432"
    volumes:
      - tsdb_data:/var/lib/postgresql/data
      - ./db/migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kama -d kama_energy"]
      interval: 5s
      timeout: 5s
      retries: 10

  emqx:
    image: emqx/emqx:5.5
    restart: unless-stopped
    ports:
      - "1883:1883"   # MQTT
      - "8883:8883"   # MQTT TLS
      - "18083:18083" # Dashboard
    environment:
      EMQX_NAME: kama-broker
      EMQX_LOG__CONSOLE__LEVEL: warning
    volumes:
      - emqx_data:/opt/emqx/data
    healthcheck:
      test: ["CMD", "/opt/emqx/bin/emqx", "ctl", "status"]
      interval: 10s
      timeout: 5s
      retries: 10

  kafka:
    image: apache/kafka:3.7.0
    restart: unless-stopped
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_LOG_RETENTION_HOURS: 168
      KAFKA_LOG_RETENTION_BYTES: 1073741824
    ports:
      - "9092:9092"
    volumes:
      - kafka_data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD", "/opt/kafka/bin/kafka-topics.sh", "--bootstrap-server", "kafka:9092", "--list"]
      interval: 10s
      timeout: 10s
      retries: 10

  api:
    build:
      context: ./apps/api
      target: dev
    restart: unless-stopped
    env_file: .env.dev
    environment:
      DATABASE_URL: postgresql+asyncpg://kama:kama_dev@timescaledb:5432/kama_energy
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    ports:
      - "8000:8000"
    volumes:
      - ./apps/api:/app
    depends_on:
      timescaledb:
        condition: service_healthy
      kafka:
        condition: service_healthy

  ingestor:
    build:
      context: ./services/ingestor
      target: dev
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://kama:kama_dev@timescaledb:5432/kama_energy
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      KAFKA_TOPIC_TELEMETRY: telemetry.raw
      KAFKA_GROUP_ID: kama-ingestor
      BATCH_SIZE: "100"
      BATCH_FLUSH_INTERVAL_SEC: "2.0"
    volumes:
      - ./services/ingestor:/app
    depends_on:
      timescaledb:
        condition: service_healthy
      kafka:
        condition: service_healthy

  influxdb:
    image: influxdb:2.7
    restart: unless-stopped
    environment:
      DOCKER_INFLUXDB_INIT_MODE: setup
      DOCKER_INFLUXDB_INIT_USERNAME: kama
      DOCKER_INFLUXDB_INIT_PASSWORD: kama_dev_password
      DOCKER_INFLUXDB_INIT_ORG: kama
      DOCKER_INFLUXDB_INIT_BUCKET: grid_switzerland
      DOCKER_INFLUXDB_INIT_ADMIN_TOKEN: kama_dev_token
      DOCKER_INFLUXDB_INIT_RETENTION: 2y
    ports:
      - "8086:8086"
    volumes:
      - influxdb_data:/var/lib/influxdb2
    healthcheck:
      test: ["CMD", "influx", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  schema-registry:
    image: confluentinc/cp-schema-registry:7.6.1
    restart: unless-stopped
    environment:
      SCHEMA_REGISTRY_HOST_NAME: schema-registry
      SCHEMA_REGISTRY_KAFKASTORE_BOOTSTRAP_SERVERS: kafka:9092
      SCHEMA_REGISTRY_LISTENERS: http://0.0.0.0:8081
    ports:
      - "8081:8081"
    depends_on:
      kafka:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/subjects"]
      interval: 10s
      timeout: 5s
      retries: 10

  grid-normalizer:
    build:
      context: ./services/grid-normalizer
      target: dev
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://kama:kama_dev@timescaledb:5432/kama_energy
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      KAFKA_TOPIC_ENTSO_E_RAW: grid.entso-e.raw
      KAFKA_TOPIC_NORMALIZED: grid.normalized
      KAFKA_GROUP_ID: kama-grid-normalizer
      SCHEMA_REGISTRY_URL: http://schema-registry:8081
      BATCH_SIZE: "200"
      BATCH_FLUSH_INTERVAL_SEC: "5.0"
    volumes:
      - ./services/grid-normalizer:/app
    depends_on:
      timescaledb:
        condition: service_healthy
      kafka:
        condition: service_healthy
      schema-registry:
        condition: service_healthy

  entso-e-ingestor:
    build:
      context: ./services/entso-e-ingestor
      target: dev
    restart: unless-stopped
    environment:
      ENTSOE_SECURITY_TOKEN: ${ENTSOE_SECURITY_TOKEN:-}
      ENTSOE_AREA_EIC: 10YCH-SWISSGRIDC
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      KAFKA_TOPIC_GRID: grid.entso-e.raw
      INFLUX_URL: http://influxdb:8086
      INFLUX_TOKEN: kama_dev_token
      INFLUX_ORG: kama
      INFLUX_BUCKET: grid_switzerland
    volumes:
      - ./services/entso-e-ingestor:/app
    depends_on:
      kafka:
        condition: service_healthy
      influxdb:
        condition: service_healthy

  report-generator:
    build:
      context: ./services/report-generator
      target: dev
    restart: unless-stopped
    environment:
      API_BASE_URL: http://api:8000
      SMTP_HOST: ${SMTP_HOST:-smtp.example.com}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_FROM: ${SMTP_FROM:-kama-reports@kama.energy}
      REPORT_RECIPIENTS: ${REPORT_RECIPIENTS:-roman@kama.energy}
      REPORT_SCHEDULE: ${REPORT_SCHEDULE:-0 7 * * 1}
      DEBUG: ${DEBUG:-false}
    volumes:
      - ./services/report-generator:/app
    depends_on:
      api:
        condition: service_started

  procurement-agent:
    build:
      context: ./services/procurement-agent
      target: dev
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://kama:kama_dev@timescaledb:5432/kama_energy
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      KAFKA_TOPIC_ORDERS_CONFIRMED: kama.orders.confirmed
      KAFKA_TOPIC_PROCUREMENT_ORDERED: kama.procurement.ordered
      KAFKA_TOPIC_PROCUREMENT_DELIVERED: kama.procurement.delivered
      KAFKA_GROUP_ID: kama-procurement-agent
      KAMA_NET_URL: ${KAMA_NET_URL:-https://nixakeaiibzhesdwtelw.supabase.co}
      KAMA_NET_API_KEY: ${KAMA_NET_API_KEY:-}
      SMTP_HOST: ${SMTP_HOST:-smtp.example.com}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-puk@kama-power.com}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_FROM: ${SMTP_FROM:-puk@kama-power.com}
      DELIVERY_WARN_DAYS: "2"
      DEBUG: ${DEBUG:-false}
    volumes:
      - ./services/procurement-agent:/app
    depends_on:
      timescaledb:
        condition: service_healthy
      kafka:
        condition: service_healthy

volumes:
  tsdb_data:
  emqx_data:
  kafka_data:
  influxdb_data:
