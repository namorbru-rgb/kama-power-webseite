services:
  timescaledb:
    image: timescale/timescaledb:latest-pg16
    restart: unless-stopped
    environment:
      POSTGRES_USER: kama
      POSTGRES_PASSWORD: kama_dev
      POSTGRES_DB: kama_energy
    ports:
      - "5432:5432"
    volumes:
      - tsdb_data:/var/lib/postgresql/data
      - ./db/migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kama -d kama_energy"]
      interval: 5s
      timeout: 5s
      retries: 10

  emqx:
    image: emqx/emqx:5.5
    restart: unless-stopped
    ports:
      - "1883:1883"   # MQTT
      - "8883:8883"   # MQTT TLS
      - "18083:18083" # Dashboard
    environment:
      EMQX_NAME: kama-broker
      EMQX_LOG__CONSOLE__LEVEL: warning
    volumes:
      - emqx_data:/opt/emqx/data
    healthcheck:
      test: ["CMD", "/opt/emqx/bin/emqx", "ctl", "status"]
      interval: 10s
      timeout: 5s
      retries: 10

  kafka:
    image: apache/kafka:3.7.0
    restart: unless-stopped
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_LOG_RETENTION_HOURS: 168
      KAFKA_LOG_RETENTION_BYTES: 1073741824
    ports:
      - "9092:9092"
    volumes:
      - kafka_data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD", "/opt/kafka/bin/kafka-topics.sh", "--bootstrap-server", "kafka:9092", "--list"]
      interval: 10s
      timeout: 10s
      retries: 10

  api:
    build:
      context: ./apps/api
      target: dev
    restart: unless-stopped
    env_file: .env.dev
    environment:
      DATABASE_URL: postgresql+asyncpg://kama:kama_dev@timescaledb:5432/kama_energy
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    ports:
      - "8000:8000"
    volumes:
      - ./apps/api:/app
    depends_on:
      timescaledb:
        condition: service_healthy
      kafka:
        condition: service_healthy

  ingestor:
    build:
      context: ./services/ingestor
      target: dev
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://kama:kama_dev@timescaledb:5432/kama_energy
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      KAFKA_TOPIC_TELEMETRY: telemetry.raw
      KAFKA_GROUP_ID: kama-ingestor
      BATCH_SIZE: "100"
      BATCH_FLUSH_INTERVAL_SEC: "2.0"
    volumes:
      - ./services/ingestor:/app
    depends_on:
      timescaledb:
        condition: service_healthy
      kafka:
        condition: service_healthy

volumes:
  tsdb_data:
  emqx_data:
  kafka_data:
